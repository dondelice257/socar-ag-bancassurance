<div class="container mt-4">
  <form [formGroup]="insuranceForm">
    <!-- Étape 1 : Lookup Client -->
    <div *ngIf="step === 1">
      <h4 class="mb-3">Étape 1 : Recherche du client</h4>
      <div class="w-50">
        <app-lookup
  url='user/list'
  [option]="'lookup'"
  itemsLabel="clients"
  (selectedItemEvent)="onClientSelected($event)">
</app-lookup>
      </div>
      <button type="button" class="btn btn-primary mt-3" [disabled]="!selectedClientId" (click)="onNext()">Suivant</button>
    </div>

<div *ngIf="step === 2">
      <h4 class="mb-3">Étape 2 : Infos véhicule et assurance</h4>

      <div class="row">
        <div class="col-md-6">
          <label for="marque">Marque</label>
          <select class="form-control" formControlName="marque">
            <option *ngFor="let marque of marques" [value]="marque">{{ marque }}</option>
          </select>
        </div>
        <div class="col-md-6 mb-3">
          <div class="form-floating">
            <input type="text" class="form-control" formControlName="modele" placeholder="Modèle">
            <label>Modèle</label>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <div class="form-floating">
            <input type="text" class="form-control" formControlName="plaque" placeholder="Plaque">
            <label>Plaque</label>
          </div>
        </div>
        <div class="col-md-6 mb-3">
          <div class="form-floating">
            <input type="text" class="form-control" formControlName="chasis" placeholder="Châssis">
            <label>Châssis</label>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <div class="form-floating">
            <select class="form-select" formControlName="puissanceMoteur">
              <option *ngFor="let puissance of puissances" [value]="puissance">{{ puissance }}</option>
            </select>
            <label>Puissance Moteur</label>
          </div>
        </div>
        <div class="col-md-6 mb-3">
          <div class="form-floating">
            <select class="form-select" formControlName="usageType">
              <option *ngFor="let usage of usages" [value]="usage">{{ usage }}</option>
            </select>
            <label>Type d'usage</label>
          </div>
        </div>
      </div>

      <div class="form-floating mb-3">
        <input type="date" class="form-control" formControlName="startDate" (change)="onPeriodChange()" placeholder="Date de début">
        <label>Date de début</label>
      </div>

      <div class="row">
        <div class="col-md-6 mb-3">
          <div class="form-floating">
            <select class="form-select" formControlName="period" (change)="onPeriodChange()">
              <option *ngFor="let period of periods" [value]="period">{{ period }}</option>
            </select>
            <label>Période</label>
          </div>
        </div>
        <div class="col-md-6 mb-3" *ngIf="insuranceForm.get('period')?.value === 'Custom'">
          <div class="form-floating">
            <input type="number" class="form-control" formControlName="customDays" (input)="onPeriodChange()" placeholder="Nombre de jours">
            <label>Nombre de jours</label>
          </div>
        </div>
      </div>

      <p class="fw-bold">Date de fin: {{ endDate }}</p>

      <button type="button" class="btn btn-secondary me-2" (click)="onBack()">Retour</button>
      <button type="button" class="btn btn-primary" [disabled]="!insuranceForm.valid" (click)="onNext()">Suivant</button>
    </div>

    <div *ngIf="step === 3">
      <h4 class="mb-3">Étape 3 : Sélection des garanties</h4>
      <div *ngFor="let guarantee of guarantees" class="form-check">
        <input class="form-check-input" type="checkbox" [value]="guarantee.id" (change)="toggleGuarantee(guarantee.id)" [checked]="selectedGuarantees.includes(guarantee.id)">
        <label class="form-check-label">{{ guarantee.name }}</label>
      </div>
      <div class="col-md-6 my-3">
        <div class="form-floating">
          <input type="text" class="form-control" formControlName="capitalAssure" placeholder="Capital">
          <label>Capital Assuré</label>
        </div>
      </div>
      <button type="button" class="btn btn-secondary me-2" (click)="onBack()">Retour</button>
      <button type="submit" (click)="onSubmit()" class="btn btn-success" [disabled]="selectedGuarantees.length === 0">Soumettre</button>
    </div>
  </form>
</div>
