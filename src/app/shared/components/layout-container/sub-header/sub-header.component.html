<div class="mt-3">
    <div class="d-grid">
        <div class="d-flex align-items-center">
            <span class="text-secondary me-1">Ticket</span>
            <span class="text-secondary me-1">/</span>
            <span class="text-secondary me-1">List</span>


        </div>
        <div class="mt-1">
            <b class="fs-4">Tickeing</b>
        </div>
        <div class="mt-2">
            <div 
            class="d-flex align-items-end border-bottom"
            >
            <b
            class="text-muted px-3 "
            role="button"
            (click)="selectMenu('list')"
            [ngClass]="selectedMenu==='list'?'border-bottom border-md-b-success text-primary':''"
             class="text-muted px-3">List</b>
            <b class="text-muted px-3 "
            role="button"
            (click)="selectMenu('new')"
            [ngClass]="selectedMenu==='new'?'border-bottom border-md-b-success text-primary':''">New</b>
            <b class="text-muted px-3"
            role="button"
            (click)="selectMenu('generate')"
            [ngClass]="selectedMenu==='generate'?'border-bottom border-md-b-success text-primary':''">Generate</b>
            <b class="text-muted px-3"
            role="button"
            (click)="selectMenu('record')"
            [ngClass]="selectedMenu==='record'?'border-bottom border-md-b-success text-primary':''">Record</b>


            </div>
        </div>

    </div>
</div>

<router-outlet></router-outlet>
